  <style>
    /* =========================
       Grundstyles (Farben & Schrift) – angepasst an Startseite
       ========================= */
    :root {
      --primary-color: #004f9f;
      --primary-light: #0077cc;
      --primary-dark: #002d6d;
      --background: #f9f9f9;
      --text: #333;
      --text-light: #666;
      --white: #ffffff;
      --border-radius: 8px;
      --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
      margin: 0;
      padding: 0;
    }
    /* Header */
    .header {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
      background-color: var(--white);
      box-shadow: var(--box-shadow);
      margin-bottom: 1.5rem;
    }
    h1 {
      color: var(--primary-dark);
      font-size: 2rem;
      margin: 0;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid var(--primary-light);
      display: inline-block;
    }
    /* Buttons (angepasst an Startseite) */
    .button-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 1rem auto;
      max-width: 1000px;
      padding: 0 1rem;
    }
    .button {
      background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
      color: var(--white);
      border: none;
      border-radius: var(--border-radius);
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: var(--box-shadow);
      cursor: pointer;
      min-width: 200px;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
    }
    /* Vereinsliste */
    .section {
      max-width: 1000px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    h2 {
      color: var(--primary-color);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
      position: relative;
      display: inline-block;
      padding-bottom: 0.5rem;
    }
    h2::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-light), var(--primary-dark));
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: var(--white);
      padding: 0.8rem 1rem;
      margin: 0.5rem 0;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      font-size: 1rem;
    }
    /* Responsive Anpassungen */
    @media (max-width: 768px) {
      .button-bar {
        flex-direction: column;
        align-items: center;
      }
      .button {
        width: 100%;
        max-width: 300px;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      h2 {
        font-size: 1.3rem;
      }
      li {
        font-size: 1.1rem;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }
      .button {
        padding: 1rem;
        font-size: 1rem;
      }
    }
  </style>
</head>

    let currentSort = 'stand';

    // Funktion zum Auswählen des Bereichs
    function selectArea(area) {
      selectedArea = area;
      renderList();
    }

    // Funktion zum Rendern der Liste
    function renderList() {
      const container = document.getElementById("output");
      container.innerHTML = "";

      // Filtere Vereine basierend auf der Auswahl
      let filteredVereine = vereine;
      if (selectedArea === "Kiel") {
        filteredVereine = vereine.filter(v => v.area === "Moorteichwiese" || v.area === "Haus des Sports" || v.area === "Rewe-Areal" || v.area === "Winterbeker Weg");
      }

      if (currentSort === "name") {
        const ul = document.createElement("ul");
        filteredVereine.sort((a, b) => a.name.localeCompare(b.name)).forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.name} (${item.prefix} ${item.stand})`;
          ul.appendChild(li);
        });
        container.appendChild(ul);
      } else {
        const grouped = filteredVereine.reduce((acc, item) => {
          if (!acc[item.area]) acc[item.area] = [];
          acc[item.area].push(item);
          return acc;
        }, {});
        for (const [area, list] of Object.entries(grouped)) {
          const section = document.createElement("div");
          section.className = "section";
          const heading = document.createElement("h2");
          heading.textContent = area;
          section.appendChild(heading);
          const ul = document.createElement("ul");
          list.sort((a, b) => a.stand - b.stand).forEach((item) => {
            const li = document.createElement("li");
            li.textContent = `${item.prefix} ${item.stand}: ${item.name}`;
            ul.appendChild(li);
          });
          section.appendChild(ul);
          container.appendChild(section);
        }
      }
    }
