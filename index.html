<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vereinsliste – Tag des Sports 2026</title>

  <style>
    /* =========================
       Grundstyles
       ========================= */
    :root {
      --primary-color: #004f9f;
      --primary-light: #0077cc;
      --primary-dark: #002d6d;
      --background: #f9f9f9;
      --text: #333;
      --text-light: #666;
      --white: #ffffff;
      --border-radius: 8px;
      --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
      margin: 0;
      padding: 0;
    }

    /* Header */
    .header {
      text*align: center;
      padding: 1.5r*m 1rem 1rem;
      background-colo*: var(--white);
      box-shadow: var(--box-shadow);
      margin-bottom: 1.5rem;
    }

    h1 {
      color: var(--primary-dark);
      font-size: 2rem;
      margin: 0;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid var(--primary-light);
      display: inline-block;
    }

    /* Buttons oben */
    .button-bar {
      display:*flex;
      flex-wrap: wrap;
     *justify-content: center;
     *gap:*1rem;
      margin: 1rem auto;
   *  max-width: 1000px;
      padding* 0 1rem;
    }

    .button {
    * background* linear-gradient(135deg, var(--pri*ary-light), var(--primary-dark));
*     color: var(--white);
      bo*der: none;
      border-radius: va*(--border-radius);
      padding: *rem 2rem;
      font-size: 1.1rem;*      font-weight: 600;
      text*decoration: none;
      text-align* center;
      transition: all 0.3* ease;
      box-shadow: var(--box*shadow);
      cursor: pointer;
  *   min-width: 200px;
    }

    .b*tton:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
    }

    .button.active {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      outline: 3px solid rgba(0, 119, 204, 0.25);
    }

    /* Suchfeld */
    .search-container {
      max-width: 1000px;
      margin: 1rem auto 1.5rem;
      padding: 0 1rem;
    }

    #searchInput {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      border: 2px solid var(--primary-light);
      border-radius: var(--border-radius);
      box-sizing: border-box;
      background: var(--white);
      box-shadow: var(--box-shadow);
    }

    #searchInput:focus {
      outline: none;
      border-color: var(--primary-dark);
    }

    .search-hint {
      max-width: 1000px;
      margin: -0.75rem auto 1.5rem;
      padding: 0 1rem;
      color: var(--text-light);
      font-size: 0.95rem;
      text-align: center;
    }

    /* Status / Hinweise */
    .status-message {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 1rem;
      background: var(--white);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      text-align: center;
      color: var(--text-light);
    }

    .error-message {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 1rem;
      background: #fff3f3;
      border: 2px solid #cc0000;
      border-radius: var(--border-radius);
      color: #990000;
      text-align: center;
    }

    /* Vereinsliste */
    .section {
      max-width: 1000px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }

    h2 {
      color: var(--primary-color);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
      position: relative;
      display: inline-block;
      padding-bottom: 0.5rem;
    }

    h2::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-light), var(--primary-dark));
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background: var(--white);
      padding: 0.8rem 1rem;
      margin: 0.5rem 0;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      font-size: 1rem;
    }

    .aktion {
      display: block;
      margin-top: 0.25rem;
      color: var(--text-light);
      font-size: 0.95rem;
    }

    /* Footer-Button-Bereich */
    .footer-button-bar {
      display: flex;
      justify-content: center;
      margin: 2rem auto 1rem;
      max-width: 1000px;
      padding: 0 1rem;
    }

    /* Responsive Anpassungen */
    @media (max-width: 768px) {
      .button-bar,
      .footer-button-bar {
        flex-direction: column;
        align-items: center;
      }

      .button {
        width: 100%;
        max-width: 300px;
        margin-bottom: 0.5rem;
      }

      h1 {
        font-size: 1.8rem;
      }

      h2 {
        font-size: 1.3rem;
      }

      li {
        font-size: 1.1rem;
        padding: 1rem;
      }

      #searchInput {
        font-size: 1rem;
        padding: 1rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      .button {
        padding: 1rem;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Vereinsliste – Tag des Sports 2026</h1>
  </div>

  <!-- Buttons oben -->
  <div class="button-bar">
    <button id="regionalButton" class="button" onclick="selectArea('regional')">
      Aktionen in Schleswig-Holstein
    </button>

    <button id="kielButton" class="button active" onclick="selectArea('kiel')">
      Kiel
    </button>
  </div>

  <!-- Suche -->
  <div class="search-container">
    <input
      type="text"
      id="searchInput"
      placeholder="🔍 Verein, Sportart oder Aktion suchen..."
      oninput="renderList()"
    />
  </div>

  <div class="search-hint">
    Suche z. B. nach „Basketball“, „Holstein“, „Tennis“, „Golf“ oder „REWE“.
  </div>

  <!-- Vereinsliste -->
  <div id="output">
    <div class="status-message">Vereinsdaten werden geladen ...</div>
  </div>

  <!-- Button unten: Zurück zur Startseite -->
  <div class="footer-button-bar">
    <a href="https://lsvtds.github.io/" class="button">Zurück zur Startseite</a>
  </div>

  <script>
    let vereine = [];
    let selectedArea = "kiel";

    async function loadData() {
      const container = document.getElementById("output");

      try {
        const kielResponse = await fetch("kiel.json");
        const regionalResponse = await fetch("regional.json");

        if (!kielResponse.ok) {
          throw new Error("kiel.json konnte nicht geladen werden.");
        }

        if (!regionalResponse.ok) {
          throw new Error("regional.json konnte nicht geladen werden.");
        }

        const kielData = await kielResponse.json();
        const regionalData = await regionalResponse.json();

        const kielVereine = kielData.map(item => ({
          ...item,
          typ: "kiel"
        }));

        const regionalVereine = regionalData.map(item => ({
          ...item,
          typ: "regional"
        }));

        vereine = [...kielVereine, ...regionalVereine];

        renderList();

      } catch (error) {
        console.error("Fehler beim Laden der Vereinsdaten:", error);

        container.innerHTML = `
          <div class="error-message">
            Die Vereinsdaten konnten nicht geladen werden.<br>
            Bitte prüfe, ob <strong>kiel.json</strong> und <strong>regional.json</strong>
            im gleichen Ordner wie die <strong>index.html</strong> liegen.
          </div>
        `;
      }
    }

    function selectArea(area) {
      selectedArea = area;

      document.getElementById("regionalButton").classList.remove("active");
      document.getElementById("kielButton").classList.remove("active");

      if (area === "regional") {
        document.getElementById("regionalButton").classList.add("active");
      }

      if (area === "kiel") {
        document.getElementById("kielButton").classList.add("active");
      }

      renderList();
    }

    function renderList() {
      const container = document.getElementById("output");
      container.innerHTML = "";

      const searchInput = document.getElementById("searchInput");
      const searchText = searchInput ? searchInput.value.toLowerCase().trim() : "";

      let filteredVereine = vereine.filter(item => item.typ === selectedArea);

      if (searchText) {
        filteredVereine = filteredVereine.filter(item => {
          const name = (item.name || "").toLowerCase();
          const area = (item.area || "").toLowerCase();
          const aktion = (item.aktion || "").toLowerCase();
          const prefix = (item.prefix || "").toLowerCase();
          const stand = item.stand ? String(item.stand).toLowerCase() : "";

          return (
            name.includes(searchText) ||
            area.includes(searchText) ||
            aktion.includes(searchText) ||
            prefix.includes(searchText) ||
            stand.includes(searchText)
          );
        });
      }

      if (filteredVereine.length === 0) {
        container.innerHTML = `
          <div class="status-message">
            Keine passenden Einträge gefunden.
          </div>
        `;
        return;
      }

      const grouped = filteredVereine.reduce((acc, item) => {
        const areaName = item.area || "Ohne Bereich";

        if (!acc[areaName]) {
          acc[areaName] = [];
        }

        acc[areaName].push(item);
        return acc;
      }, {});

      for (const [area, list] of Object.entries(grouped)) {
        const section = document.createElement("div");
        section.className = "section";

        const heading = document.createElement("h2");
        heading.textContent = area;
        section.appendChild(heading);

        const ul = document.createElement("ul");

        list
          .sort((a, b) => {
            const standA = Number(a.stand) || 0;
            const standB = Number(b.stand) || 0;
            return standA - standB;
          })
          .forEach((item) => {
            const li = document.createElement("li");

            const prefix = item.prefix || "";
            const stand = item.stand || "";
            const name = item.name || "Ohne Namen";
            const aktion = item.aktion || "";

            li.innerHTML = `
              <strong>${prefix} ${stand}: ${name}</strong>
              ${aktion ? `<span class="aktion">${aktion}</span>` : ""}
            `;

            ul.appendChild(li);
          });

        section.appendChild(ul);
        container.appendChild(section);
      }
    }

    loadData();
  </script>
</body>
</html>
